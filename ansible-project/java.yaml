---
- name: Java Version
  become: yes
  hosts: "{{targets}}"
  connection: ssh
  gather_facts: true
  tasks:
    - name: Install Java for RedHat Family (Amazon Linux)
      ansible.builtin.yum:
        name: 
          - java-11-amazon-corretto
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install Java for Debian Family (Ubuntu)
      ansible.builtin.apt:
        name: openjdk-11-jdk
        update_cache: yes
        state: present
      when: ansible_os_family == "Debian"

    - name: Checking java Version
      ansible.builtin.shell: 'java -version'
      register: java_result

    - name: Display Version
      ansible.builtin.debug:
        msg: "{{ java_result.stderr_lines, java_result.rc }}"
