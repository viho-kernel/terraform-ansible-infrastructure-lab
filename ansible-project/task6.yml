---
- name: File creation
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - block:
        - name: Ensure demo files are there
          ansible.builtin.file:
            path: /tmp/demo.txt
            state: touch

        - name: Write some content
          ansible.builtin.copy:
            content: "Putting some content in that"
            dest: /tmp/demo.txt
            owner: ansadmin
            group: ansadmin
            mode: "0644"
      become: yes

      rescue:
        - name: Capturing log
          ansible.builtin.debug:
            msg: "file creation error on {{ inventory_hostname }}"

      always:
        - name: Capturing facts
          ansible.builtin.setup:
            filter: ansible_facts['mounts']
        - name: printing values
          ansible.builtin.debug:
            msg:
              - "Mount: {{ item.mount }}"
              - " Device: {{ item.device }}"
              - " Total Space: {{ (item.size_total / (1024*1024*1024)) | round(2) }} GB"
              - " Available Space: {{ (item.size_available / (1024*1024*1024)) | round(2) }} GB"
          loop: "{{ ansible_facts['mounts'] }}"
