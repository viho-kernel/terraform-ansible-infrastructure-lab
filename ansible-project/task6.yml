---
- name: File creation
  hosts: localhost
  connection: local
  become: yes
  gather_facts: true

  tasks:
    block:
      - name: Ensure demo files are there
        ansible.builtin.file:
          pathsa: /tmp/demo.txt
          state: touch

      - name: Write some content
        ansible.builtin.copy:
          content: "Putting some content in that"
          dest: /tmp/demo.txt
          owner: ansadmin
          group: ansadmin
          mode: "0644"
    rescue:
      - name: Captuing log
        ansible.builtin.debug:
          var: "file creation error on {{ inventory_hostname }} "
