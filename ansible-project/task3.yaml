- name: Install Nginx
  hosts: dev
  become: yes
  gather_facts: true

  tasks:
    - name: Install Nginx on Debian/Ubuntu
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "Debian"
      notify: restart nginx

    - name: Install Nginx on Amazon Linux/RHEL
      ansible.builtin.yum:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "RedHat"
      notify: restart nginx

    - name: check the status of nginx
      ansible.builtin.shell: systemctl status nginx
      notify: restart nginx

    - name: Stop Apache on Debian/Ubuntu
      ansible.builtin.service:
        name: apache2
        state: stopped
        enabled: false
      when: ansible_facts.os_family == "Debian"

    - name: Stop Apache on Amazon Linux/RHEL
      ansible.builtin.service:
        name: httpd
        state: stopped
        enabled: false
      when: ansible_facts.os_family == "RedHat"

  handlers:
    - name: restart nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
