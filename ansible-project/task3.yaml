- name: Install Nginx
  hosts: dev
  become: yes
  gather_facts: true

  tasks:
    - name: Remove Nginx on Debian/Ubuntu
      ansible.builtin.apt:
        name: nginx
        state: absent
        purge: yes
      when: ansible_facts.os_family == "Debian"

    - name: Remove Nginx on Amazon Linux/RHEL
      ansible.builtin.yum:
        name: nginx
        state: absent
      when: ansible_facts.os_family == "RedHat"

    - name: Change Nginx port to 8080
      ansible.builtin.replace:
        path: /etc/nginx/sites-available/default
        regexp: "listen 80;"
        replace: "listen 8080;"
      when: ansible_facts.os_family == "Debian"

    - name: Change Nginx port to 8080 (RHEL/Amazon Linux)
      ansible.builtin.replace:
        path: /etc/nginx/nginx.conf
        regexp: "listen       80;"
        replace: "listen       8080;"
      when: ansible_facts.os_family == "RedHat"

    - name: Install Nginx on Debian/Ubuntu
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "Debian"
      notify: restart nginx

    - name: Install Nginx on Amazon Linux/RHEL
      ansible.builtin.yum:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "RedHat"
      notify: restart nginx

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Check Nginx status
      ansible.builtin.debug:
        msg: >
          Nginx is {{
           'running' if (services['nginx'].state == 'running') else 'not running'
          }}
  when: "'nginx' in services"
  handlers:
    - name: restart nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
