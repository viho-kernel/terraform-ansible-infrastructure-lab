- name: Install Nginx
  hosts: dev
  become: yes
  gather_facts: true

  tasks:
    - name: Install Nginx on Debian/Ubuntu
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes
      notify: restart nginx

    - name: Install Nginx on Amazon Linux/RHEL
      ansible.builtin.yum:
        name: nginx
        state: present
        update_cache: yes
      notify: restart nginx
    
  handlers: 
      - name: restart nginx
        ansible.builtin.service:
          name: nginx
          state: started
          enabled: true
